name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build amd64
        run: go build -ldflags="-s -w -X dck/cmd.version=${GITHUB_REF_NAME#v}" -o dck-linux-amd64 .

      - name: Build arm64
        run: GOARCH=arm64 go build -ldflags="-s -w -X dck/cmd.version=${GITHUB_REF_NAME#v}" -o dck-linux-arm64 .

      - name: Create release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "See the commit history for details." \
            --repo "$GITHUB_REPOSITORY" \
            2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload amd64
        run: |
          gh release upload "$GITHUB_REF_NAME" dck-linux-amd64 --repo "$GITHUB_REPOSITORY" --clobber
          sha256sum dck-linux-amd64 > dck-linux-amd64.sha256
          gh release upload "$GITHUB_REF_NAME" dck-linux-amd64.sha256 --repo "$GITHUB_REPOSITORY" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload arm64
        run: |
          gh release upload "$GITHUB_REF_NAME" dck-linux-arm64 --repo "$GITHUB_REPOSITORY" --clobber
          sha256sum dck-linux-arm64 > dck-linux-arm64.sha256
          gh release upload "$GITHUB_REF_NAME" dck-linux-arm64.sha256 --repo "$GITHUB_REPOSITORY" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
