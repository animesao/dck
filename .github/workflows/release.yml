name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.18'

      - name: Build .deb package
        run: |
          VERSION=$(cat VERSION | head -1 | tr -d '[:space:]')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          make deb

      - name: Upload .deb to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.ref_name }} dist/*.deb --clobber

      - name: Generate APT repo metadata
        run: |
          VERSION=$(cat VERSION | head -1 | tr -d '[:space:]')
          APT_DIR="docs/apt"
          mkdir -p "$APT_DIR/binary-amd64"
          cp "dist/dck_${VERSION}_amd64.deb" "$APT_DIR/binary-amd64/"

          cd "$APT_DIR/binary-amd64"
          > Packages
          for deb in *.deb; do
            SIZE=$(stat -c%s "$deb")
            SHA256=$(sha256sum "$deb" | cut -d' ' -f1)
            cat >> Packages <<PKG
Package: dck
Version: ${VERSION}
Architecture: amd64
Maintainer: animesao <animesao@users.noreply.github.com>
Filename: binary-amd64/$deb
Size: $SIZE
SHA256: $SHA256
Description: dck - lightweight container runtime
 No daemon. No Docker. Just containers.

PKG
          done
          gzip -9fk Packages

          cd "$GITHUB_WORKSPACE/$APT_DIR"
          NOW=$(date -u +"%a, %d %b %Y %H:%M:%S UTC")
          cat > Release <<EOF
Origin: dck
Label: dck APT Repository
Suite: stable
Codename: dck
Date: $NOW
Architectures: amd64
Components: binary
Description: dck lightweight container runtime
SHA256:
 $(sha256sum binary-amd64/Packages | cut -d' ' -f1) $(stat -c%s "binary-amd64/Packages") binary-amd64/Packages
 $(sha256sum binary-amd64/Packages.gz | cut -d' ' -f1) $(stat -c%s "binary-amd64/Packages.gz") binary-amd64/Packages.gz
EOF
          cp Release InRelease

      - name: Commit APT repo to main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(cat VERSION | head -1 | tr -d '[:space:]')
          git checkout main
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/apt/
          git commit -m "Update APT repo for v${VERSION}" --allow-empty
          git push origin main
