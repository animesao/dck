name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Build amd64
        run: go build -ldflags="-s -w -X dck/cmd.version=${GITHUB_REF_NAME#v}" -o dck-linux-amd64 .

      - name: Build arm64
        run: GOARCH=arm64 go build -ldflags="-s -w -X dck/cmd.version=${GITHUB_REF_NAME#v}" -o dck-linux-arm64 .

      - name: Package .deb (amd64)
        run: VERSION="${GITHUB_REF_NAME#v}" ARCH=amd64 ./scripts/build-deb.sh

      - name: Package .deb (arm64)
        run: VERSION="${GITHUB_REF_NAME#v}" ARCH=arm64 ./scripts/build-deb.sh

      - name: Create release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "See the commit history for details." \
            --repo "$GITHUB_REPOSITORY" \
            2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload amd64
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "$GITHUB_REF_NAME" dck-linux-amd64 --repo "$GITHUB_REPOSITORY" --clobber
          sha256sum dck-linux-amd64 > dck-linux-amd64.sha256
          gh release upload "$GITHUB_REF_NAME" dck-linux-amd64.sha256 --repo "$GITHUB_REPOSITORY" --clobber
          gh release upload "$GITHUB_REF_NAME" "dist/dck_${VERSION}_amd64.deb" --repo "$GITHUB_REPOSITORY" --clobber
          sha256sum "dist/dck_${VERSION}_amd64.deb" > "dist/dck_${VERSION}_amd64.deb.sha256"
          gh release upload "$GITHUB_REF_NAME" "dist/dck_${VERSION}_amd64.deb.sha256" --repo "$GITHUB_REPOSITORY" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload arm64
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "$GITHUB_REF_NAME" dck-linux-arm64 --repo "$GITHUB_REPOSITORY" --clobber
          sha256sum dck-linux-arm64 > dck-linux-arm64.sha256
          gh release upload "$GITHUB_REF_NAME" dck-linux-arm64.sha256 --repo "$GITHUB_REPOSITORY" --clobber
          gh release upload "$GITHUB_REF_NAME" "dist/dck_${VERSION}_arm64.deb" --repo "$GITHUB_REPOSITORY" --clobber
          sha256sum "dist/dck_${VERSION}_arm64.deb" > "dist/dck_${VERSION}_arm64.deb.sha256"
          gh release upload "$GITHUB_REF_NAME" "dist/dck_${VERSION}_arm64.deb.sha256" --repo "$GITHUB_REPOSITORY" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix release flags (prerelease/latest)
        run: |
          TAG="${GITHUB_REF_NAME#refs/tags/}"
          if echo "$TAG" | grep -q -- "-dev."; then
            echo "🔖 Marking $TAG as prerelease"
            gh release edit "$TAG" --prerelease --latest=false --repo "$GITHUB_REPOSITORY"
          else
            echo "🔖 Marking $TAG as latest"
            gh release edit "$TAG" --latest --prerelease=false --repo "$GITHUB_REPOSITORY"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
