name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.18'

      - name: Build .deb package
        run: |
          VERSION=$(cat VERSION | head -1 | tr -d '[:space:]')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          make deb

      - name: Upload .deb to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.ref_name }} dist/*.deb --clobber

      - name: Generate APT repo metadata
        run: |
          VERSION=$(cat VERSION | head -1 | tr -d '[:space:]')
          APT_DIR="docs/apt"
          mkdir -p "$APT_DIR/binary-amd64"
          cp "dist/dck_${VERSION}_amd64.deb" "$APT_DIR/binary-amd64/"

          cd "$APT_DIR/binary-amd64"
          > Packages
          for deb in *.deb; do
            SIZE=$(stat -c%s "$deb")
            SHA256=$(sha256sum "$deb" | cut -d' ' -f1)
            echo "Package: dck" >> Packages
            echo "Version: ${VERSION}" >> Packages
            echo "Architecture: amd64" >> Packages
            echo "Maintainer: animesao <animesao@users.noreply.github.com>" >> Packages
            echo "Filename: binary-amd64/$deb" >> Packages
            echo "Size: $SIZE" >> Packages
            echo "SHA256: $SHA256" >> Packages
            echo "Description: dck - lightweight container runtime" >> Packages
            echo " No daemon. No Docker. Just containers." >> Packages
            echo "" >> Packages
          done
          gzip -9fk Packages

          cd "$GITHUB_WORKSPACE/$APT_DIR"
          NOW=$(date -u +"%a, %d %b %Y %H:%M:%S UTC")
          {
            echo "Origin: dck"
            echo "Label: dck APT Repository"
            echo "Suite: stable"
            echo "Codename: dck"
            echo "Date: $NOW"
            echo "Architectures: amd64"
            echo "Components: binary"
            echo "Description: dck lightweight container runtime"
            echo "SHA256:"
            echo " $(sha256sum binary-amd64/Packages | cut -d' ' -f1) $(stat -c%s 'binary-amd64/Packages') binary-amd64/Packages"
            echo " $(sha256sum binary-amd64/Packages.gz | cut -d' ' -f1) $(stat -c%s 'binary-amd64/Packages.gz') binary-amd64/Packages.gz"
          } > Release
          cp Release InRelease

      - name: Commit APT repo to main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(cat VERSION | head -1 | tr -d '[:space:]')
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/apt/
          git commit -m "Update APT repo for v${VERSION}" --allow-empty
          git push origin HEAD:main
