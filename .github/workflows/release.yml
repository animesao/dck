name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.18'

      - name: Build snap package (clean tree first)
        run: |
          set -e
          VERSION=$(cat VERSION | head -1 | tr -d '[:space:]')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          # Remove build artifacts so snap build tree is clean
          rm -rf dist docs/apt dck 2>/dev/null || true

      - name: Build snap package
        uses: snapcore/action-build@v1
        id: snapcraft

      - name: Build .deb package
        run: |
          set -e
          VERSION=$(cat VERSION | head -1 | tr -d '[:space:]')
          echo "Building dck v$VERSION..."

          # Build binary
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X dck/cmd.version=$VERSION" -o dck .

          # Build .deb
          PKG_ROOT="packaging/deb"
          install -d "$PKG_ROOT/usr/bin"
          install -m 755 dck "$PKG_ROOT/usr/bin/dck"
          chmod 755 "$PKG_ROOT/DEBIAN/postinst" "$PKG_ROOT/DEBIAN/prerm"
          mkdir -p dist
          dpkg-deb --build "$PKG_ROOT" "dist/dck_${VERSION}_amd64.deb"

          echo "Built: dist/dck_${VERSION}_amd64.deb"

      - name: Create release and upload .deb + .snap
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --generate-notes 2>/dev/null || true
          gh release upload ${{ github.ref_name }} dist/*.deb --clobber
          gh release upload ${{ github.ref_name }} "${{ steps.snapcraft.outputs.snap }}" --clobber

      - name: Generate APT repo metadata (flat layout)
        run: |
          set -e
          VERSION=$(cat VERSION | head -1 | tr -d '[:space:]')
          APT_DIR="docs/apt"
          mkdir -p "$APT_DIR"
          cp "dist/dck_${VERSION}_amd64.deb" "$APT_DIR/"

          cd "$APT_DIR"
          > Packages
          for deb in *.deb; do
            SIZE=$(stat -c%s "$deb")
            SHA256=$(sha256sum "$deb" | cut -d' ' -f1)
            echo "Package: dck" >> Packages
            echo "Version: ${VERSION}" >> Packages
            echo "Architecture: amd64" >> Packages
            echo "Maintainer: animesao <animesao@users.noreply.github.com>" >> Packages
            echo "Filename: $deb" >> Packages
            echo "Size: $SIZE" >> Packages
            echo "SHA256: $SHA256" >> Packages
            echo "Description: dck - lightweight container runtime" >> Packages
            echo " No daemon. No Docker. Just containers." >> Packages
            echo "" >> Packages
          done
          gzip -9fk Packages

          NOW=$(date -u +"%a, %d %b %Y %H:%M:%S UTC")
          {
            echo "Origin: dck"
            echo "Label: dck APT Repository"
            echo "Suite: stable"
            echo "Codename: dck"
            echo "Date: $NOW"
            echo "Architectures: amd64"
            echo "Description: dck lightweight container runtime"
            echo "SHA256:"
            echo " $(sha256sum Packages | cut -d' ' -f1) $(stat -c%s 'Packages') Packages"
            echo " $(sha256sum Packages.gz | cut -d' ' -f1) $(stat -c%s 'Packages.gz') Packages.gz"
          } > Release
          cp Release InRelease
          rm -rf binary-amd64 2>/dev/null || true

      - name: Commit APT repo to main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(cat VERSION | head -1 | tr -d '[:space:]')
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin main
          git checkout main
          # Only add docs/apt/ if the directory exists (might not on first run)
          if [ -d docs/apt ]; then
            git add docs/apt/
            git commit -m "Update APT repo for v${VERSION}" --allow-empty
            git push origin main
          else
            echo "docs/apt/ not found - skipping APT repo commit"
          fi
