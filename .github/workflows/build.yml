name: Build & Release

permissions:
  contents: write

on:
  push:
    branches: [main, dev]
    tags: ['v*.*.*', 'v*.*.*-*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: |
          VERSION=$(cat VERSION)
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -tags netgo -installsuffix netgo \
            -ldflags="-s -w -X dck/cmd.version=$VERSION" \
            -o dck-linux-amd64 .

      - name: Checksum
        run: sha256sum dck-linux-amd64 > dck-linux-amd64.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: dck-linux-amd64
          path: |
            dck-linux-amd64
            dck-linux-amd64.sha256

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dck-linux-amd64
            dck-linux-amd64.sha256
          generate_release_notes: true
