name: Build & Release

permissions:
  contents: write

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Bump version
        id: bump
        run: |
          VERSION=$(cat VERSION 2>/dev/null || echo "1.20.0")
          BASE=$(echo "$VERSION" | sed 's/^v//' | sed 's/-.*//')
          if echo "$BASE" | grep -q '^[0-9]\+\.[0-9]\+\.[0-9]\+$'; then
            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            PATCH=$(echo "$BASE" | cut -d. -f3)
            NEW_PATCH=$((PATCH + 1))
            NEW_VER="$MAJOR.$MINOR.$NEW_PATCH"
          else
            NEW_VER="1.21.0"
          fi
          echo "NEW_VER=$NEW_VER" >> $GITHUB_OUTPUT
          echo "$NEW_VER" > VERSION

      - name: Build
        run: |
          VERSION=${{ steps.bump.outputs.NEW_VER }}
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -tags netgo -installsuffix netgo \
            -ldflags="-s -w -X dck/cmd.version=$VERSION" \
            -o dck-linux-amd64 .

      - name: Checksum
        run: sha256sum dck-linux-amd64 > dck-linux-amd64.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: dck-linux-amd64
          path: |
            dck-linux-amd64
            dck-linux-amd64.sha256

      - name: Commit VERSION and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to ${{ steps.bump.outputs.NEW_VER }} [skip ci]"
          git tag v${{ steps.bump.outputs.NEW_VER }}
          git push origin main --tags

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.NEW_VER }}
          files: |
            dck-linux-amd64
            dck-linux-amd64.sha256
          generate_release_notes: true
