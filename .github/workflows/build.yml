name: Build

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build amd64
        run: go build -o dck-linux-amd64 .

      - name: Build arm64
        run: GOARCH=arm64 go build -o dck-linux-arm64 .

      - name: Test
        run: go test ./...
