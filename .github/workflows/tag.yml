name: Auto Tag & Release

on:
  push:
    branches: [main, dev]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.create.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          RAW=$(cat VERSION)
          CLEAN="${RAW#v}"
          echo "version=$CLEAN" >> $GITHUB_OUTPUT

      - name: Create tag
        id: create
        run: |
          SHA=$(git rev-parse --short HEAD)
          VERSION="${{ steps.version.outputs.version }}"
          if [ "${{ github.ref_name }}" = "main" ]; then
            TAG="v${VERSION}-stalbal.${SHA}"
          else
            TAG="v${VERSION}-dev.${SHA}"
          fi
          EXISTS=$(git tag -l "$TAG")
          if [ -z "$EXISTS" ]; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git tag "$TAG"
            git push origin "$TAG"
            echo "✅ Created tag: $TAG"
          else
            echo "⏭️  Tag $TAG already exists"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Update version files
        run: |
          TAG="${{ steps.create.outputs.tag }}"
          if [ -n "$TAG" ]; then
            CLEAN="${TAG#v}"
            echo "$CLEAN" > VERSION
            BADGE_TAG=$(echo "$TAG" | sed 's/-/--/g')
            sed -i "s|badge/version-[^?]*|badge/version-$BADGE_TAG-blue|" README.md
            git add VERSION README.md
            git commit -m "chore: update VERSION to $CLEAN [skip ci]" || true
            git push origin "${{ github.ref_name }}" 2>/dev/null || true
          fi

  release:
    runs-on: ubuntu-latest
    needs: [tag]
    if: needs.tag.outputs.tag != ''
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.tag }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Build amd64
        run: go build -ldflags="-s -w -X dck/cmd.version=${{ needs.tag.outputs.version }}" -o dck-linux-amd64 .

      - name: Build arm64
        run: GOARCH=arm64 go build -ldflags="-s -w -X dck/cmd.version=${{ needs.tag.outputs.version }}" -o dck-linux-arm64 .

      - name: Package .deb (amd64)
        run: VERSION="${{ needs.tag.outputs.version }}" ARCH=amd64 ./scripts/build-deb.sh

      - name: Package .deb (arm64)
        run: VERSION="${{ needs.tag.outputs.version }}" ARCH=arm64 ./scripts/build-deb.sh

      - name: Create release
        run: |
          gh release create "${{ needs.tag.outputs.tag }}" \
            --title "${{ needs.tag.outputs.tag }}" \
            --notes "See the commit history for details." \
            --repo "$GITHUB_REPOSITORY" \
            2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload amd64
        run: |
          gh release upload "${{ needs.tag.outputs.tag }}" dck-linux-amd64 --repo "$GITHUB_REPOSITORY" --clobber
          sha256sum dck-linux-amd64 > dck-linux-amd64.sha256
          gh release upload "${{ needs.tag.outputs.tag }}" dck-linux-amd64.sha256 --repo "$GITHUB_REPOSITORY" --clobber
          gh release upload "${{ needs.tag.outputs.tag }}" "dist/dck_${{ needs.tag.outputs.version }}_amd64.deb" --repo "$GITHUB_REPOSITORY" --clobber
          sha256sum "dist/dck_${{ needs.tag.outputs.version }}_amd64.deb" > "dist/dck_${{ needs.tag.outputs.version }}_amd64.deb.sha256"
          gh release upload "${{ needs.tag.outputs.tag }}" "dist/dck_${{ needs.tag.outputs.version }}_amd64.deb.sha256" --repo "$GITHUB_REPOSITORY" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload arm64
        run: |
          gh release upload "${{ needs.tag.outputs.tag }}" dck-linux-arm64 --repo "$GITHUB_REPOSITORY" --clobber
          sha256sum dck-linux-arm64 > dck-linux-arm64.sha256
          gh release upload "${{ needs.tag.outputs.tag }}" dck-linux-arm64.sha256 --repo "$GITHUB_REPOSITORY" --clobber
          gh release upload "${{ needs.tag.outputs.tag }}" "dist/dck_${{ needs.tag.outputs.version }}_arm64.deb" --repo "$GITHUB_REPOSITORY" --clobber
          sha256sum "dist/dck_${{ needs.tag.outputs.version }}_arm64.deb" > "dist/dck_${{ needs.tag.outputs.version }}_arm64.deb.sha256"
          gh release upload "${{ needs.tag.outputs.tag }}" "dist/dck_${{ needs.tag.outputs.version }}_arm64.deb.sha256" --repo "$GITHUB_REPOSITORY" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix release flags
        run: |
          TAG="${{ needs.tag.outputs.tag }}"
          if echo "$TAG" | grep -q -- "-dev."; then
            echo "🔖 Marking $TAG as prerelease"
            gh release edit "$TAG" --prerelease --latest=false --repo "$GITHUB_REPOSITORY"
          else
            echo "🔖 Marking $TAG as latest"
            gh release edit "$TAG" --latest --prerelease=false --repo "$GITHUB_REPOSITORY"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
