linters:
  enable:
    - gosimple
    - staticcheck
    - unused
  disable:
    - errcheck
    - ineffassign
    - typecheck
    - govet

issues:
  exclude-use-default: false
  exclude:
    - "func.*is unused"
    - "type.*is unused"
    - "field.*is unused"
  exclude-rules:
    - path: _test\.go
      linters:
        - unused
    - path: internal/container/events\.go
      linters:
        - unused
    - path: internal/image/push\.go
      linters:
        - unused
    - path: internal/image/pull\.go
      linters:
        - unused
